# VPN Manager Log Rotation
/var/log/vpn-manager/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    create 640 root root
}

/var/log/xray/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    postrotate
        systemctl kill --kill-who=main --signal=SIGUSR1 xray.service 2>/dev/null || true
    endscript
}
